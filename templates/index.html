<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Iris Flower Prediction</h2>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="sl">Sepal Length</label>
                <input id="sl" type="number" step="0.1" placeholder="e.g., 5.1" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="sw">Sepal Width</label>
                <input id="sw" type="number" step="0.1" placeholder="e.g., 3.5" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="pl">Petal Length</label>
                <input id="pl" type="number" step="0.1" placeholder="e.g., 1.4" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="pw">Petal Width</label>
                <input id="pw" type="number" step="0.1" placeholder="e.g., 0.2" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>

            <button onclick="predict()" 
                    class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg shadow-sm transition duration-200">
                Predict
            </button>
        </div>

        <h3 id="result" class="mt-6 text-center text-lg font-semibold h-6"></h3>
    </div>

    <script>
    async function predict() {
        const response = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                sepal_length: document.getElementById("sl").value,
                sepal_width: document.getElementById("sw").value,
                petal_length: document.getElementById("pl").value,
                petal_width: document.getElementById("pw").value
            })
        });

        const data = await response.json();
        const resultElement = document.getElementById("result");

        if(data.error) {
            resultElement.innerHTML = data.error;
            // Tailwind classes for error text
            resultElement.className = "mt-6 text-center text-lg font-semibold text-red-600 h-6";
        } else {
            resultElement.innerHTML = "Prediction: " + data.prediction;
            // Tailwind classes for success text
            resultElement.className = "mt-6 text-center text-lg font-semibold text-green-600 h-6";
        }
    }
    </script>

</body>
</html>
